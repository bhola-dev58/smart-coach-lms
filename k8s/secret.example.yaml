# ============================================
# MeetMe Center - Kubernetes Secrets Template
# ============================================
# INSTRUCTIONS:
# 1. Copy this file: cp secret.example.yaml secret.yaml
# 2. Replace all placeholder values with your real credentials
# 3. NEVER commit secret.yaml to Git (it's already in .gitignore)
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: meetme-center-secrets
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://<username>:<password>@<cluster>.mongodb.net/meetme-center?retryWrites=true&w=majority"
  NEXTAUTH_URL: "https://your-production-domain.com"
  NEXTAUTH_SECRET: "generate-a-strong-random-secret-here"
  RAZORPAY_KEY_ID: "rzp_live_xxxxxxxxxxxx"
  RAZORPAY_KEY_SECRET: "your-razorpay-secret-here"
  NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_live_xxxxxxxxxxxx"
